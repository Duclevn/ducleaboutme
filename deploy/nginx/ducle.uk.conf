server {
    listen 80;
    listen [::]:80;
    server_name www.ducle.uk;

    return 301 https://ducle.uk$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name ducle.uk;

    root /opt/ducle.uk;
    index index.html;

    access_log /var/log/nginx/ducle.uk.access.log;
    error_log /var/log/nginx/ducle.uk.error.log;

    location = /index.html {
        return 301 /;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
