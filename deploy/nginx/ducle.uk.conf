server {
    listen 80;
    listen [::]:80;
    server_name www.ducle.uk;

    return 301 https://ducle.uk$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name ducle.uk;

    root /opt/ducle.uk;
    index index.html;

    if ($http_x_forwarded_proto != "https") {
        return 301 https://ducle.uk$request_uri;
    }

    access_log /var/log/nginx/ducle.uk.access.log;
    error_log /var/log/nginx/ducle.uk.error.log;

    location = /index.html {
        return 301 https://ducle.uk/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ducle.uk;

    ssl_certificate /etc/letsencrypt/live/ducle.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ducle.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ducle.uk$request_uri;
}

server {
    listen 443 ssl http2;
